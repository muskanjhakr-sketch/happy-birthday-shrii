
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shrii ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd6e8,#fff5f8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
padding:30px;
}

h1{
font-size:45px;
color:#ff2d75;
margin-bottom:10px;
}

h2{
font-size:28px;
color:#444;
}

p{
font-size:18px;
color:#555;
line-height:1.7;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
margin-top:25px;
transition:.3s;
}

button:hover{
background:#ff4d94;
transform:scale(1.05);
}

.heart{
position:absolute;
color:pink;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

100%{
transform:translateY(-120vh);
opacity:1;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Shrii ❤️</h1>

<h2>29 June 🎂</h2>

<p>

Today is not just your birthday...

It's the day when someone truly special came into this world.

Thank you for being a beautiful part of my life. ❤️

</p>

<button onclick="alert('More surprises are waiting... ❤️')">

Open Surprise 🎁

</button>

</div>

<script>

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*5)+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}

</script>

</body>

</html>
